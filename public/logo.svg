             C 202.5,144.5 198.5,142 194,140.8 Z"/>
  </g>

  <!-- yellow face (front) -->
  <circle cx="105.49" cy="180.82" r="106" fill="url(#yellowBody)"/>
  <g fill="none" stroke-linecap="round" filter="url(#soften)" clip-path="url(#clipYellow)">
    <path d="M 14,233.5 A 105,105 0 0 1 6.4,144.7" stroke="url(#yellowShade)" stroke-width="4.5"/>
    <path d="M 1,168 A 104.5,104.5 0 0 1 31.6,106.9" stroke="url(#yellowSheen)" stroke-width="3.4"/>
    <path d="M 31.6,106.9 A 104.5,104.5 0 0 1 82,79" stroke="url(#yellowSheenEnd)" stroke-width="3.4"/>
  </g>
  <ellipse cx="81.3" cy="248.8" rx="33.5" ry="20.9" transform="rotate(18.7 81.3 248.8)" fill="url(#gloss)"/>
  <g fill="#2E2829" stroke="#2E2829" stroke-width="1" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="105" cy="136.7" rx="17.1" ry="20.6"/>
    <ellipse cx="147.5" cy="128.3" rx="15.6" ry="19.5"/>
