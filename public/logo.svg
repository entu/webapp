<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- Face body gradients — light source top-left of each face -->
    <radialGradient id="redBody" gradientUnits="userSpaceOnUse" cx="202.9" cy="18.1" r="197">
      <stop offset="0.02" stop-color="#F8A3AC"/>
      <stop offset="0.12" stop-color="#F9ADB5"/>
      <stop offset="0.25" stop-color="#F8A3AC"/>
      <stop offset="0.45" stop-color="#F68B96"/>
      <stop offset="0.62" stop-color="#F47A87"/>
      <stop offset="0.75" stop-color="#F26876"/>
      <stop offset="0.88" stop-color="#F15665"/>
      <stop offset="0.98" stop-color="#EC323F"/>
    </radialGradient>
    <radialGradient id="yellowBody" gradientUnits="userSpaceOnUse" cx="115" cy="100.5" r="183.2">
      <stop offset="0.02" stop-color="#FFDD2D"/>
      <stop offset="0.22" stop-color="#FFD82C"/>
      <stop offset="0.48" stop-color="#FFCB2A"/>
      <stop offset="0.68" stop-color="#FFC329"/>
      <stop offset="0.82" stop-color="#FFBD27"/>
      <stop offset="0.95" stop-color="#FFB025"/>
      <stop offset="0.98" stop-color="#FFA924"/>
    </radialGradient>
    <!-- Dark rim on the red face's lower-right (away from the light) -->
    <radialGradient id="redRim" gradientUnits="userSpaceOnUse" cx="170" cy="90" r="140">
      <stop offset="0.8" stop-color="#E7262B" stop-opacity="0"/>
      <stop offset="0.92" stop-color="#E7262B" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#E7262B" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Glossy highlight on the yellow face's lower-left -->
    <radialGradient id="gloss" gradientUnits="objectBoundingBox" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD569"/>
      <stop offset="0.85" stop-color="#FFD569"/>
      <stop offset="1" stop-color="#FFD569" stop-opacity="0"/>
    </radialGradient>
    <!-- Rim-light sheens along the upper-left edges + shade on yellow's left -->
    <linearGradient id="yellowSheen" gradientUnits="userSpaceOnUse" x1="0" y1="178" x2="31.6" y2="106.9">
      <stop offset="0" stop-color="#FFEFB6" stop-opacity="0.2"/>
      <stop offset="0.3" stop-color="#FFEFB6" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFEFB6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="yellowSheenEnd" gradientUnits="userSpaceOnUse" x1="31.6" y1="106.9" x2="82" y2="79">
      <stop offset="0" stop-color="#FFEFB6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFEFB6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redSheen" gradientUnits="userSpaceOnUse" x1="95" y1="81.6" x2="110.9" y2="52.9">
      <stop offset="0" stop-color="#FFE9F2" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFE9F2" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="redSheenEnd" gradientUnits="userSpaceOnUse" x1="110.9" y1="52.9" x2="129" y2="34.8">
      <stop offset="0" stop-color="#FFE9F2" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFE9F2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="yellowShade" gradientUnits="userSpaceOnUse" x1="14" y1="233.5" x2="6.4" y2="144.7">
      <stop offset="0" stop-color="#FF9C1E" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#FF9C1E" stop-opacity="0.45"/>
      <stop offset="0.8" stop-color="#FF9C1E" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FF9C1E" stop-opacity="0.1"/>
    </linearGradient>
    <clipPath id="clipRed"><circle cx="193.52" cy="117.43" r="106.35"/></clipPath>
    <clipPath id="clipYellow"><circle cx="105.49" cy="180.82" r="106"/></clipPath>
    <filter id="soften" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
  </defs>

  <!-- red face (behind) -->
  <circle cx="193.52" cy="117.43" r="106.35" fill="url(#redBody)"/>
  <circle cx="193.52" cy="117.43" r="106.35" fill="url(#redRim)"/>
  <g fill="none" stroke-linecap="round" filter="url(#soften)" clip-path="url(#clipRed)">
    <path d="M 95,81.6 A 104.8,104.8 0 0 1 110.9,52.9" stroke="url(#redSheen)" stroke-width="3.2"/>
    <path d="M 110.9,52.9 A 104.8,104.8 0 0 1 129,34.8" stroke="url(#redSheenEnd)" stroke-width="3.2"/>
  </g>
  <g fill="#2E2829" stroke="#2E2829" stroke-width="1" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="192.3" cy="76.5" rx="17" ry="20.7"/>
    <ellipse cx="234.7" cy="68.1" rx="15.6" ry="19.4"/>
